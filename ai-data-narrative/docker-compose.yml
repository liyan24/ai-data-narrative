version: "3.8"

services:
  ai-data-narrative:
    build: .
    container_name: ai-data-narrative
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.moonshot.cn/v1}
      - LLM_MODEL=${LLM_MODEL:-kimi-latest}
    ports:
      - "7860:7860"
    command: python run.py data/sales_data.csv --output /app/output
    
  # 可选：Web 服务
  web:
    build: .
    container_name: ai-data-narrative-web
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.moonshot.cn/v1}
    ports:
      - "7860:7860"
    command: python src/web/app.py
    depends_on:
      - ai-data-narrative
